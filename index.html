<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Team Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
    <h2>Name or ID</h2>
    <input type="text" id="pokemonInput">
    <button id="findBtn">Find</button>

    <div id="pokemonDisplay">
        <img id="pokemonImage" />
        <br><br>

        <audio id="pokemonSound" controls></audio>
        <br><br>

        <select id="move1"></select>
        <select id="move2"></select><br><br>
        <select id="move3"></select>
        <select id="move4"></select><br><br>

        <button id="addBtn">Add to Team</button>
    </div>

    <div id="team"></div>
</div>

<script src="script.js"></script>
</body>
</html>
